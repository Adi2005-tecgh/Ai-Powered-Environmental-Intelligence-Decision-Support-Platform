{% extends "layout.html" %}

{% block title %}TWEET{% endblock %}

{% block content %}
<h1 class="text-center text-white">Welcome to my web</h1>

<h2>
    {% if form.instance.pk %}
        EDIT TWEET
    {% else %}
        CREATE TWEET
    {% endif %}
</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form }}
    <button class="btn btn-warning" type="submit">Submit</button>
</form>

<a href="{% url 'tweet_list' %}">BACK TO TWEET LIST</a>

{% endblock %}
